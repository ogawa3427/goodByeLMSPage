<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Bye LMS Page</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 280px;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: #fff;
        color: #222;
      }

      /* 登録セクション */
      #register-section {
        padding: 14px 16px;
        background: #fffbea;
        border-bottom: 1px solid #e8d96a;
      }

      #register-section p {
        font-size: 13px;
        color: #555;
        margin-bottom: 10px;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        padding: 5px 14px;
        border-radius: 4px;
        border: 1px solid #bbb;
        cursor: pointer;
        font-size: 13px;
        background: #f5f5f5;
      }

      button:hover { opacity: 0.82; }

      button.primary {
        background: #1a6fd4;
        color: #fff;
        border-color: #1a6fd4;
        font-weight: bold;
      }

      /* 進捗セクション */
      #progress-section {
        padding: 14px 16px;
        border-bottom: 1px solid #eee;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        font-size: 13px;
        color: #bbb;
      }

      .step.running { color: #222; }
      .step.done    { color: #2a7a2a; }
      .step.error   { color: #c0392b; }

      .step-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid #ddd;
        border-top-color: #555;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      .step-label { flex: 1; }

      .step-detail {
        font-size: 12px;
        color: inherit;
        opacity: 0.8;
        min-width: 48px;
        text-align: right;
      }

      /* エラーセクション */
      #error-section {
        padding: 12px 16px;
        background: #fff0f0;
        border-bottom: 1px solid #f5a0a0;
        font-size: 12px;
        color: #c0392b;
      }

      #error-section p { line-height: 1.5; }
      #error-section p + p { margin-top: 6px; }

      .error-hint {
        color: #888;
        font-size: 11px;
      }

      /* タイトルセクション */
      #title-section {
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #title-section img { width: 32px; height: 32px; }

      #title-section h1 { font-size: 15px; font-weight: bold; color: #111; }
    </style>
  </head>
  <body>
    <div id="register-section" style="display: none;">
      <p>このページの講義データを登録できます</p>
      <div class="btn-row">
        <button id="btn-later">後で</button>
        <button id="btn-yes" class="primary">Yes</button>
      </div>
    </div>

    <div id="error-section" style="display: none;">
      <p id="error-msg"></p>
      <p class="error-hint">DevTools の Console を開いてログをコピーし、開発者に報告してください。</p>
    </div>

    <div id="progress-section" style="display: none;">
      <div class="step" id="step-1">
        <div class="step-icon">○</div>
        <span class="step-label">テーブル取得</span>
        <span class="step-detail" id="detail-1"></span>
      </div>
      <div class="step" id="step-2">
        <div class="step-icon">○</div>
        <span class="step-label">LMSリンク取得</span>
        <span class="step-detail" id="detail-2"></span>
      </div>
      <div class="step" id="step-3">
        <div class="step-icon">○</div>
        <span class="step-label">データ保存</span>
        <span class="step-detail" id="detail-3"></span>
      </div>
    </div>

    <div id="title-section">
      <img src="/images/icon-38.png" alt="icon" />
      <h1>Good Bye LMS Page</h1>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
