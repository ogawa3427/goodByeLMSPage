<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Bye LMS Page</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 280px;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: #fff;
        color: #222;
      }

      /* 登録セクション */
      #register-section {
        padding: 14px 16px;
        background: #fffbea;
        border-bottom: 1px solid #e8d96a;
      }

      #register-section p {
        font-size: 13px;
        color: #555;
        margin-bottom: 10px;
      }

      .btn-row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        padding: 5px 14px;
        border-radius: 4px;
        border: 1px solid #bbb;
        cursor: pointer;
        font-size: 13px;
        background: #f5f5f5;
      }

      button:hover { opacity: 0.82; }

      button.primary {
        background: #1a6fd4;
        color: #fff;
        border-color: #1a6fd4;
        font-weight: bold;
      }

      /* 進捗セクション */
      #progress-section {
        padding: 14px 16px;
        border-bottom: 1px solid #eee;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 0;
        font-size: 13px;
        color: #bbb;
      }

      .step.running { color: #222; }
      .step.done    { color: #2a7a2a; }
      .step.error   { color: #c0392b; }

      .step-icon {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid #ddd;
        border-top-color: #555;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      .step-label { flex: 1; }

      .step-detail {
        font-size: 12px;
        color: inherit;
        opacity: 0.8;
        min-width: 48px;
        text-align: right;
      }

      /* エラーセクション */
      #error-section {
        padding: 12px 16px;
        background: #fff0f0;
        border-bottom: 1px solid #f5a0a0;
        font-size: 12px;
        color: #c0392b;
      }

      #error-section p { line-height: 1.5; }
      #error-section p + p { margin-top: 6px; }

      .error-hint {
        color: #888;
        font-size: 11px;
      }

      /* タイトルセクション */
      #title-section {
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #eee;
      }

      #title-section img { width: 32px; height: 32px; }

      #title-section h1 { font-size: 15px; font-weight: bold; color: #111; }

      /* 講義ミニ一覧 */
      #lecture-mini-section {
        max-height: 192px;
        overflow-y: auto;
        border-bottom: 1px solid #eee;
      }

      .mini-empty {
        padding: 10px 16px;
        font-size: 12px;
        color: #aaa;
      }

      .mini-row {
        display: flex;
        align-items: center;
        padding: 6px 16px;
        border-bottom: 1px solid #f5f5f5;
        gap: 8px;
      }

      .mini-row:last-child { border-bottom: none; }

      .mini-header {
        padding: 5px 16px;
        font-size: 11px;
        font-weight: bold;
        color: #666;
        background: #f8f8f8;
        border-bottom: 1px solid #eee;
      }

      .mini-period {
        flex-shrink: 0;
        width: 40px;
        font-size: 11px;
        color: #999;
      }

      .mini-subject {
        flex: 1;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-subject a {
        color: #1a6fd4;
        text-decoration: none;
      }

      .mini-subject a:hover { text-decoration: underline; }

      .mini-subject span { color: #aaa; }

      /* バージョンセクション */
      #version-section {
        padding: 8px 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #999;
      }

      #version-label {
        font-weight: bold;
        color: #555;
        flex-shrink: 0;
      }

      #version-status {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #version-status a {
        color: #e74c3c;
        font-weight: bold;
        text-decoration: underline;
        cursor: pointer;
      }

      #version-check-btn {
        padding: 3px 8px;
        font-size: 11px;
        border-radius: 3px;
        border: 1px solid #ccc;
        background: #f8f8f8;
        cursor: pointer;
        flex-shrink: 0;
      }

      #version-check-btn:hover { opacity: 0.8; }
      #version-check-btn:disabled { opacity: 0.5; cursor: default; }

      /* データ設定 */
      #data-settings {
        border-top: 1px solid #eee;
      }

      #data-settings summary {
        padding: 8px 16px;
        font-size: 11px;
        color: #888;
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 4px;
        user-select: none;
      }

      #data-settings summary::-webkit-details-marker { display: none; }

      #data-settings summary::before {
        content: '▶';
        font-size: 9px;
        transition: transform 0.15s;
      }

      #data-settings[open] summary::before {
        transform: rotate(90deg);
      }

      #data-settings summary:hover { color: #555; }

      .settings-body {
        padding: 4px 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .settings-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: #444;
      }

      .settings-row button {
        padding: 3px 10px;
        font-size: 11px;
        border-radius: 3px;
        border: 1px solid #ccc;
        background: #f8f8f8;
        cursor: pointer;
      }

      .settings-row button:hover { opacity: 0.8; }

      .settings-row button.danger {
        border-color: #e0a0a0;
        color: #c0392b;
        background: #fff5f5;
      }

      #import-feedback {
        font-size: 11px;
        color: #2a7a2a;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <div id="register-section" style="display: none;">
      <p>このページの講義データを登録できます</p>
      <div class="btn-row">
        <button id="btn-later">後で</button>
        <button id="btn-yes" class="primary">Yes</button>
      </div>
    </div>

    <div id="error-section" style="display: none;">
      <p id="error-msg"></p>
      <p class="error-hint">DevTools の Console を開いてログをコピーし、開発者に報告してください。</p>
    </div>

    <div id="progress-section" style="display: none;">
      <div class="step" id="step-1">
        <div class="step-icon">○</div>
        <span class="step-label">テーブル取得</span>
        <span class="step-detail" id="detail-1"></span>
      </div>
      <div class="step" id="step-2">
        <div class="step-icon">○</div>
        <span class="step-label">LMSリンク取得</span>
        <span class="step-detail" id="detail-2"></span>
      </div>
      <div class="step" id="step-3">
        <div class="step-icon">○</div>
        <span class="step-label">データ保存</span>
        <span class="step-detail" id="detail-3"></span>
      </div>
    </div>

    <div id="title-section">
      <img src="/images/icon-38.png" alt="icon" />
      <h1>Good Bye LMS Page</h1>
    </div>

    <div id="lecture-mini-section">
      <div class="mini-empty">未登録 — 学務情報サービスの「履修時間割」ページを開いてデータを登録してください</div>
    </div>

    <div id="version-section">
      <span id="version-label">v<span id="version-current"></span></span>
      <span id="version-status">確認中...</span>
      <button id="version-check-btn">更新確認</button>
    </div>

    <details id="data-settings">
      <summary>データ設定</summary>
      <div class="settings-body">
        <div class="settings-row">
          <span>登録データを削除</span>
          <button id="btn-delete" class="danger">削除</button>
        </div>
        <div class="settings-row">
          <span>JSONでエクスポート</span>
          <button id="btn-export">書き出し</button>
        </div>
        <div class="settings-row">
          <span>JSONでインポート</span>
          <button id="btn-import">読み込み</button>
        </div>
        <div id="import-feedback"></div>
        <input id="import-file" type="file" accept=".json" style="display:none;" />
      </div>
    </details>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
